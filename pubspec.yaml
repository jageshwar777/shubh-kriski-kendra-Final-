name: shubh_mart
description: "Shubh Mart - Village Shop App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  file_picker: ^8.0.0
  provider: ^6.1.2
  image_picker: ^1.1.0
  share_plus: ^10.1.0
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/